name: Beehiiv Custom Field Updater
slug: beehiiv-custom-field-updater
type: plugin
version: 0.1.0
description: This plugin updates custom fields of a beehiiv subscriber after the user fills a form.
icon: plug
author:
  name: Rodrigo Girao Serrao
  email: rodrigo@mathspp.com
homepage: https://github.com/rodrigogiraoserrao/grav-plugin-beehiiv-custom-field-updater
demo: http://demo.yoursite.com
keywords: grav, plugin, etc
bugs: https://github.com/rodrigogiraoserrao/grav-plugin-beehiiv-custom-field-updater/issues
docs: https://github.com/rodrigogiraoserrao/grav-plugin-beehiiv-custom-field-updater/blob/develop/README.md
license: MIT

dependencies:
  - { name: grav, version: '>=1.6.0' }

form:
  validation: loose
  fields:
    enabled:
      type: toggle
      label: PLUGIN_ADMIN.PLUGIN_STATUS
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool
    text_var:
      type: text
      label: PLUGIN_BEEHIIV_CUSTOM_FIELD_UPDATER.TEXT_VARIABLE
      help: PLUGIN_BEEHIIV_CUSTOM_FIELD_UPDATER.TEXT_VARIABLE_HELP
